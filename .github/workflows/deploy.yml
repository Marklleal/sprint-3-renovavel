name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mdBook and KaTeX plugin
        run: |
          # Instala o mdBook padrão
          curl -sSL https://github.com/rust-lang/mdBook/releases/latest/download/mdbook-v0.4.43-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook /usr/local/bin/
          
          # Instala o plugin do KaTeX (necessário para suas fórmulas matemáticas)
          curl -sSL https://github.com/luser/mdbook-katex/releases/latest/download/mdbook-katex-v0.9.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook-katex /usr/local/bin/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build mdBook
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
